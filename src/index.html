<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Switch</title>
  </head>
  <body>
    <main class="dashboard">
      <section class="profiles-column">
        <div id="profiles-grid" class="profiles-grid"></div>
      </section>

      <aside class="summary-column">
        <article class="summary-card">
          <div class="summary-card-topbar">
            <p id="current-session-label" class="summary-label">Current session</p>
            <button id="locale-toggle-button" class="ghost-button locale-toggle-button" type="button">中文</button>
          </div>
          <h2 id="current-title">--</h2>
          <p id="current-plan" class="summary-plan">--</p>
          <div class="summary-actions">
            <button id="current-login-button" class="primary-button wide-button" type="button">Login</button>
            <button id="open-current-folder-button" class="ghost-button wide-button" type="button">Open folder</button>
          </div>
        </article>

        <article class="summary-card quota-card">
          <h3 id="current-quota-label">Current quota</h3>
          <div id="current-quota-panel" class="quota-stack"></div>
        </article>

        <div class="control-grid">
          <span id="runtime-status" class="runtime-pill control-cell">Checking runtime</span>
          <button id="add-profiles-button" class="ghost-button control-button" type="button">Add Profiles</button>
          <button id="open-codex-button" class="ghost-button control-button" type="button">Open Codex</button>
          <button id="contact-button" class="ghost-button control-button" type="button">Contact Us</button>
          <button id="previous-page-button" class="ghost-button pager-button" type="button">Previous</button>
          <button id="next-page-button" class="ghost-button pager-button" type="button">Next</button>
        </div>
      </aside>
    </main>

    <dialog id="add-profile-dialog" class="dialog">
      <form id="add-profile-form" class="dialog-form" method="dialog">
        <div class="dialog-copy">
          <h3 id="dialog-title">Add Profile</h3>
          <p id="dialog-copy">Create a new backup folder with template <code>auth.json</code> and <code>profile.json</code>.</p>
        </div>

        <label class="field">
          <span id="folder-name-label">Folder name</span>
          <input id="folder-name-input" name="folder_name" type="text" autocomplete="off" required />
        </label>

        <p id="dialog-error" class="dialog-error" hidden></p>

        <div class="dialog-actions">
          <button id="cancel-add-profile-button" class="ghost-button" type="button">Cancel</button>
          <button id="submit-add-profile-button" class="primary-button" type="submit">Create</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
