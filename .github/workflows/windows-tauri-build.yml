name: Build Windows Portable EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build-windows-portable:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build portable EXE
        run: npm run tauri:build

      - name: Upload portable artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: codex_switch-windows-portable
          path: src-tauri/target/release/codex_switch.exe

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_PATH: src-tauri/target/release/codex_switch.exe
        shell: bash
        run: |
          set -euo pipefail
          gh --version

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ASSET_PATH#codex_switch.exe" --clobber
          else
            gh release create "$TAG_NAME" "$ASSET_PATH#codex_switch.exe" --verify-tag --generate-notes
          fi
